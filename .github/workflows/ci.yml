name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - stage-kshanik-search
  pull_request:
    branches:
      - master

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Frontend
        run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: |
          cd backend
          go mod download

      - name: Run Tests
        run: |
          cd backend
          go test -v ./...
