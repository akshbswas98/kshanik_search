services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kshanik-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kshanik-network

  caddy:
    image: caddy:latest
    container_name: kshanik-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - kshanik-network
    depends_on:
      - backend

networks:
  kshanik-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
